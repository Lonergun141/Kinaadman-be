{% load static %}
<!DOCTYPE html>
<html>

<head>
    <title>Kinaadman API Documentation</title>
    <link rel="icon" href="{% static 'icon-light.png' %}">
    <!-- Needed for styling the custom back button nicely -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Needed for Redoc -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css?family=Montserrat:300,400,700|Roboto:300,400,700" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        /* Move redoc down slightly so it doesn't overlap our top bar */
        #redoc-container {
            margin-top: 50px;
        }
    </style>
</head>

<body>

    <!-- Custom Sticky Top Navigation Bar -->
    <div
        class="fixed top-0 left-0 right-0 h-[50px] bg-slate-800 flex items-center px-6 z-50 border-b border-slate-700 shadow-sm justify-between">
        <div class="flex items-center space-x-4">
            <a href="/" class="text-white hover:text-blue-400 flex items-center text-sm font-medium transition-colors">
                <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Return to Gateway
            </a>
        </div>
        <div class="text-slate-300 text-xs font-semibold uppercase tracking-wider">
            Kinaadman Developer Portal
        </div>
    </div>

    <!-- Redoc Injection Target -->
    <div id="redoc-container"></div>

    <script src="https://cdn.redoc.ly/redoc/latest/bundles/redoc.standalone.js"> </script>
    <script>
        Redoc.init('{{ openapi_json_url }}', {
            scrollYOffset: 50,
            theme: {
                colors: {
                    primary: {
                        main: '#2563eb' /* blue-600 */
                    }
                },
                typography: {
                    fontFamily: 'Inter, sans-serif'
                }
            }
        }, document.getElementById('redoc-container'))
    </script>
</body>

</html>
