{% load static %}
<!DOCTYPE html>
<html>

<head>
    <title>Kinaadman API Documentation</title>
    <link rel="icon" href="{% static 'icon-light.png' %}?v=2">
    <script src="https://cdn.tailwindcss.com"></script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Google Fonts: Merriweather & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --color-bg: #F8FAFC;
            --color-nav-bg: #0F2A44;
            --color-nav-border: #C9A227;
            --color-nav-text: #E5E7EB;
            --color-nav-highlight: #C9A227;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--color-bg);
        }

        #redoc-container {
            margin-top: 60px;
        }

        .top-nav {
            background-color: var(--color-nav-bg);
            border-color: var(--color-nav-border);
        }

        .top-nav-text {
            color: var(--color-nav-text);
        }

        .top-nav-highlight {
            color: var(--color-nav-highlight);
        }
    </style>
</head>

<body>

    <!-- Academic Style Sticky Top Navigation Bar -->
    <div class="fixed top-0 left-0 right-0 h-[60px] flex items-center px-8 z-50 border-b-2 justify-between top-nav">
        <div class="flex items-center space-x-4">
            <a href="/" class="group flex items-center text-sm font-medium transition-colors top-nav-text">
                <svg class="w-4 h-4 mr-2 transform group-hover:-translate-x-1 transition-transform top-nav-highlight"
                    fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Return to Access Portals
            </a>
        </div>
        <div class="text-xs font-semibold uppercase tracking-widest font-serif top-nav-highlight">
            Developer API Reference
        </div>
    </div>

    <!-- Redoc Injection Target -->
    <div id="redoc-container"></div>

    <script src="https://cdn.redoc.ly/redoc/latest/bundles/redoc.standalone.js"> </script>
    <script>
        const lightTheme = {
            colors: {
                primary: { main: '#0F2A44' },
                success: { main: '#16A34A' },
                warning: { main: '#D97706' },
                error: { main: '#DC2626' },
                border: { dark: '#1E293B', light: '#E5E7EB' }
            },
            typography: { fontFamily: 'Inter, sans-serif', headings: { fontFamily: 'Merriweather, serif', fontWeight: '700' } },
            sidebar: { backgroundColor: '#F8FAFC', textColor: '#1E293B' },
            rightPanel: { backgroundColor: '#1E293B', textColor: '#E5E7EB' }
        };

        Redoc.init('{{ openapi_json_url }}', {
            scrollYOffset: 60,
            theme: lightTheme
        }, document.getElementById('redoc-container'))
    </script>
</body>

</html>
